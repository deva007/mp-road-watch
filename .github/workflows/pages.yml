name: Deploy public road watch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the "Data checked" stamp reflects the last
          # commit that actually touched public/data/roads.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Never deploy a partial or corrupt dataset — fail here and the
      # last good deploy stays live.
      - run: python3 scripts/validate-road-data.py public/data/roads
      - run: npm run build:pages
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /mp-road-watch
          NEXT_PUBLIC_SITE_URL: https://deva007.github.io
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
